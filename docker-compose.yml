services:
  # ─── PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: nckhai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    shm_size: 64mb

  # ─── MinIO (S3 file storage) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nckhai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Ollama: dùng local (host) cho nhẹ, không chạy trong Docker ──
  # Ollama local: http://localhost:11434
  # Pull model: ollama pull qwen2.5:3b

  # ─── Python AI Service (OCR + NLP + LLM proxy) ────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nckhai-ai
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── NestJS Backend ────────────────────────────────────
  back-end:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      target: development
    container_name: nckhai-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_OPTIONS: "--max-old-space-size=384"
      AI_SERVICE_URL: http://ai-service:8000
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_URL: http://localhost:9002
    volumes:
      - ./back-end:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
      - backend_prisma:/usr/src/app/node_modules/.prisma
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M

  # ─── React Frontend ────────────────────────────────────
  font-end:
    build:
      context: ./font-end
      dockerfile: Dockerfile
    container_name: nckhai-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./font-end:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      - back-end
    deploy:
      resources:
        limits:
          memory: 512M

# ─── Named Volumes (TẤT CẢ persist qua restart) ─────────
volumes:
  postgres_data:          # DB data → không mất khi restart
  minio_data:             # File uploads → không mất khi restart
  backend_node_modules:
  backend_prisma:
  frontend_node_modules:
